# Training Config for VLM/LLM LoRA Fine-Tuning
model:
  pretrained_model_name_or_path: "llava-hf/llava-1.5-7b-hf"
  use_lora: true
  lora:
    r: 16
    lora_alpha: 32
    target_modules: 
      - "q_proj"
      - "v_proj"
      - "k_proj"
      - "o_proj"
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"

training:
  output_dir: "./lora_checkpoints"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.001
  optimizer: "adamw_8bit" # Use 8-bit AdamW for budget constraint machines
  logging_steps: 5
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  fp16: true # Run with mixed precision for memory optimization
  bf16: false

image_augmentation:
  resize:
    size: [336, 336]
  random_resized_crop:
    scale: [0.85, 1.0]
    ratio: [0.75, 1.33]
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.1
  random_affine:
    degrees: 5
    translate: [0.05, 0.05]
